<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>BioScan AI — Mobile Capture</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0e1a;
      --surface:     #111827;
      --surface2:    #1f2937;
      --border:      #374151;
      --accent:      #60a5fa;
      --green:       #34d399;
      --warn-bg:     #451a03;
      --warn-border: #92400e;
      --warn-text:   #fbbf24;
      --err-bg:      #2d1515;
      --err-border:  #7f1d1d;
      --err-text:    #f87171;
      --text:        #f9fafb;
      --muted:       #9ca3af;
      --radius:      12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 0 16px 40px;
    }

    .container { max-width: 480px; margin: 0 auto; }

    /* ── Header ──────────────────────────────────────── */
    header {
      text-align: center;
      padding: 28px 0 22px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    header h1 { font-size: 1.55rem; font-weight: 700; color: var(--accent); }
    header p  { color: var(--muted); margin-top: 5px; font-size: 0.85rem; }

    /* ── Card ────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
    }

    /* ── Inputs ──────────────────────────────────────── */
    .input-group { margin-bottom: 14px; }
    .input-group:last-child { margin-bottom: 0; }
    .input-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1.1rem;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    .input-group input::-webkit-inner-spin-button,
    .input-group input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .input-group input:focus { border-color: var(--accent); }

    /* ── Camera area ─────────────────────────────────── */
    .camera-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    #mobile-video,
    #photo-preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #camera-unavailable {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      padding: 20px;
      line-height: 1.5;
    }
    #mobile-canvas { display: none; }

    /* ── File input fallback ─────────────────────────── */
    #file-label {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--surface2);
      border: 1px dashed var(--border);
      border-radius: 10px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 14px;
      transition: border-color 0.15s;
    }
    #file-label:hover { border-color: var(--accent); }
    #file-input { display: none; }

    /* ── Buttons ─────────────────────────────────────── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 10px;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
    .btn:not(:disabled):active { transform: scale(0.97); }
    .btn-primary   { background: var(--accent); color: #0a0e1a; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-retake    { background: transparent; color: var(--muted); border: 1px solid var(--border); }

    /* ── Error ───────────────────────────────────────── */
    .error-box {
      background: var(--err-bg);
      border: 1px solid var(--err-border);
      color: var(--err-text);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 0.87rem;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    /* ── Loading ─────────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 26, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 999;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--muted); font-size: 0.92rem; }

    /* ── Results ─────────────────────────────────────── */
    .weight-display { text-align: center; padding: 14px 0 6px; }
    .weight-value {
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: -2px;
      color: var(--green);
      line-height: 1;
    }
    .weight-label {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .ci-section { margin: 20px 0 4px; }
    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .ci-bar-wrapper {
      position: relative;
      height: 28px;
      display: flex;
      align-items: center;
    }
    .ci-bar-track {
      position: absolute;
      left: 0; right: 0;
      height: 8px;
      background: var(--surface2);
      border-radius: 4px;
    }
    .ci-bar-fill {
      position: absolute;
      top: 0;
      height: 100%;
      background: var(--accent);
      opacity: 0.5;
      border-radius: 4px;
      transition: left 0.3s, width 0.3s;
    }
    .ci-bar-marker {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      background: var(--green);
      border: 2px solid var(--bg);
      border-radius: 50%;
      z-index: 2;
    }
    .ci-axis {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 0.77rem;
      color: var(--muted);
    }
    .ci-range-center {
      text-align: center;
      font-size: 0.83rem;
      color: var(--muted);
      margin-top: 8px;
    }
    .ci-range-center strong { color: var(--text); }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    .stat-item {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .stat-value { font-size: 1rem; font-weight: 600; }

    .low-confidence-warning {
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      color: var(--warn-text);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 0.87rem;
      line-height: 1.55;
      margin-top: 14px;
    }
    .low-confidence-warning::before { content: '⚠ '; }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <h1>BioScan AI</h1>
      <p>Stand facing the camera · full body visible</p>
    </header>

    <!-- Inputs -->
    <div class="card">
      <div class="input-group">
        <label for="height-cm">Height (cm)</label>
        <input type="number" id="height-cm" min="50" max="300" step="1"
               placeholder="175" inputmode="numeric" />
      </div>
      <div class="input-group">
        <label for="age">Age (years)</label>
        <input type="number" id="age" min="5" max="120" step="1"
               placeholder="30" inputmode="numeric" />
      </div>
    </div>

    <!-- Camera / preview -->
    <div class="card">
      <div class="camera-wrapper" id="camera-wrapper">
        <video id="mobile-video" autoplay playsinline muted></video>
        <img id="photo-preview" alt="Captured photo preview" hidden />
        <div id="camera-unavailable" hidden>
          Camera unavailable. Use the file chooser below to select a photo.
        </div>
      </div>
      <canvas id="mobile-canvas"></canvas>

      <!-- File-input fallback (shown when getUserMedia fails) -->
      <label id="file-label" hidden>
        📷&nbsp; Tap to choose a photo
        <input type="file" id="file-input" accept="image/*" capture="environment" />
      </label>

      <!-- Primary: take photo from live stream -->
      <button id="take-photo-btn" class="btn btn-primary" hidden>
        📸&nbsp; Take Photo
      </button>

      <!-- Shown after a photo is captured or file is selected -->
      <button id="analyze-btn" class="btn btn-primary" hidden>
        🔍&nbsp; Analyze
      </button>
      <button id="retake-btn" class="btn btn-retake" hidden>
        ↺&nbsp; Retake
      </button>
    </div>

    <!-- Error -->
    <div id="error-box" class="error-box" hidden></div>

    <!-- Results -->
    <div id="results" class="card" hidden>
      <div class="weight-display">
        <div class="weight-value" id="result-weight">—</div>
        <div class="weight-label">Estimated body weight</div>
      </div>

      <div class="ci-section">
        <div class="section-label">95 % Confidence Interval</div>
        <div class="ci-bar-wrapper">
          <div class="ci-bar-track">
            <div class="ci-bar-fill" id="ci-bar-fill"></div>
          </div>
          <div class="ci-bar-marker" id="ci-bar-marker"></div>
        </div>
        <div class="ci-axis">
          <span id="ci-bar-min"></span>
          <span id="ci-bar-max"></span>
        </div>
        <div class="ci-range-center" id="ci-range-text"></div>
      </div>

      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-label">Uncertainty (σ)</div>
          <div class="stat-value" id="result-std">—</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Processing time</div>
          <div class="stat-value" id="result-time">—</div>
        </div>
      </div>

      <div id="low-confidence-warning" class="low-confidence-warning" hidden></div>
    </div>

  </div><!-- /container -->

  <div id="loading" hidden>
    <div class="spinner"></div>
    <p>Analyzing…</p>
  </div>

  <script src="./static/js/mobile.js"></script>
</body>
</html>
